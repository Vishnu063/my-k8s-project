apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/<your-username>/devsecops-platform.git'
    path: k8s
    targetRevision: master
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: devsecops-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
